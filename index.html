<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iceland Trip</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0805;font-family:'Crimson Pro',Georgia,serif;color:#e8ddd0;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* AUTH */
#auth-screen{position:fixed;inset:0;background:#0a0805;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;text-align:center;padding:24px;}
#auth-screen h1{font-family:'Cinzel',serif;font-size:2.2rem;color:#ff7a1e;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px;}
#auth-screen p{color:rgba(232,221,208,0.45);font-style:italic;margin-bottom:44px;font-size:1rem;}
#auth-screen.gone{display:none;}
#no-access{position:fixed;inset:0;background:#0a0805;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9000;text-align:center;padding:24px;}
#no-access h2{font-family:'Cinzel',serif;color:#ff5014;font-size:1.3rem;margin-bottom:14px;}
#no-access p{color:rgba(232,221,208,0.45);font-style:italic;max-width:340px;line-height:1.7;}
#no-access.show{display:flex;}
#sign-in-btn{font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;padding:14px 34px;border-radius:3px;border:1px solid rgba(255,120,30,0.5);background:rgba(255,120,30,0.15);color:#ff9040;cursor:pointer;transition:all 0.2s;}
#sign-in-btn:hover:not(:disabled){background:rgba(255,120,30,0.3);}
#sign-in-btn:disabled{opacity:0.45;cursor:default;}
#auth-msg{margin-top:14px;font-size:0.78rem;color:rgba(232,221,208,0.38);font-style:italic;min-height:18px;}

/* HEADER */
#app{display:flex;flex-direction:column;height:100dvh;visibility:hidden;}
#app.show{visibility:visible;}
header{padding:10px 16px;background:#0a0805;border-bottom:1px solid rgba(255,120,30,0.2);display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;z-index:500;position:relative;}
header h1{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;letter-spacing:0.15em;color:#ff7a1e;text-transform:uppercase;}
.tbtn{font-family:'Cinzel',serif;font-size:0.63rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:2px;border:1px solid rgba(255,120,30,0.3);background:transparent;color:rgba(232,221,208,0.4);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.tbtn.on{background:rgba(255,120,30,0.15);color:#ff9040;border-color:rgba(255,120,30,0.6);}
.lbtn{font-family:'Cinzel',serif;font-size:0.63rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:2px;border:1px solid rgba(232,221,208,0.15);background:transparent;color:rgba(232,221,208,0.38);cursor:pointer;transition:all 0.2s;}
.lbtn:hover{color:#e8ddd0;border-color:rgba(232,221,208,0.38);}
.leg-row{display:flex;gap:11px;align-items:center;margin-left:auto;}
.leg{display:flex;align-items:center;gap:4px;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.06em;color:rgba(232,221,208,0.45);}
.ld{width:8px;height:8px;border-radius:50%;border:2px solid;flex-shrink:0;}
.ld.a{background:rgba(255,80,20,0.75);border-color:#ff5014;box-shadow:0 0 4px #ff5014;}
.ld.d{background:rgba(255,165,40,0.65);border-color:#ffa028;box-shadow:0 0 4px #ffa028;}
.ld.i{background:rgba(130,110,80,0.55);border-color:#8c7a5a;}
.ld.m{background:rgba(32,210,190,0.85);border-color:#20d2be;box-shadow:0 0 4px #20d2be;}
.ld.y{background:rgba(80,180,255,0.85);border-color:#50b4ff;box-shadow:0 0 4px #50b4ff;}
.user-row{display:flex;align-items:center;gap:7px;}
#user-label{font-size:0.68rem;color:rgba(232,221,208,0.38);font-style:italic;}
.so-btn{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;padding:3px 7px;border:1px solid rgba(232,221,208,0.15);background:transparent;color:rgba(232,221,208,0.3);cursor:pointer;border-radius:2px;}
.so-btn:hover{color:#e8ddd0;}

/* SEARCH */
#search-bar{padding:7px 14px;background:#0e0c09;border-bottom:1px solid rgba(32,210,190,0.15);flex-shrink:0;display:none;position:relative;}
#search-bar.show{display:block;}
#search-input{width:100%;background:#1a1510;border:1px solid rgba(32,210,190,0.25);border-radius:3px;color:#e8ddd0;font-family:'Crimson Pro',serif;font-size:0.92rem;padding:7px 11px;outline:none;}
#search-input:focus{border-color:rgba(32,210,190,0.5);}
#search-drop{position:absolute;left:14px;right:14px;background:#1a1510;border:1px solid rgba(32,210,190,0.2);border-top:none;border-radius:0 0 3px 3px;z-index:2000;display:none;max-height:210px;overflow-y:auto;}
.si{padding:9px 12px;cursor:pointer;border-bottom:1px solid rgba(32,210,190,0.07);font-size:0.86rem;transition:background 0.15s;}
.si:last-child{border-bottom:none;}
.si:hover{background:rgba(32,210,190,0.08);}
.si b{display:block;color:#e8ddd0;}
.si small{color:rgba(232,221,208,0.38);font-size:0.72rem;}

/* MAP */
#map-wrap{flex:1;position:relative;}
#map{height:100%;width:100%;}
.leaflet-container{background:#0e0c09;}
.leaflet-tile{filter:brightness(0.42) saturate(0.25) hue-rotate(10deg);}

/* LIST PANEL */
#list-panel{position:absolute;left:0;top:0;bottom:0;width:264px;background:#0e0c09;border-right:1px solid rgba(255,120,30,0.18);z-index:800;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.25s ease;}
#list-panel.open{transform:translateX(0);}
.lp-head{padding:13px 14px 11px;border-bottom:1px solid rgba(255,120,30,0.1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.lp-head span{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;color:#ff9040;}
.lp-close{background:none;border:none;color:rgba(232,221,208,0.38);cursor:pointer;font-size:0.95rem;}
.lp-close:hover{color:#e8ddd0;}
#list-items{flex:1;overflow-y:auto;padding:5px 0;}
#list-items::-webkit-scrollbar{width:3px;}
#list-items::-webkit-scrollbar-thumb{background:rgba(255,120,30,0.18);border-radius:2px;}
.li{padding:9px 13px;cursor:pointer;border-bottom:1px solid rgba(255,120,30,0.06);display:flex;gap:9px;align-items:center;transition:background 0.15s;}
.li:hover{background:rgba(255,120,30,0.05);}
.li-thumb{width:36px;height:36px;border-radius:2px;object-fit:cover;flex-shrink:0;}
.li-empty{width:36px;height:36px;border-radius:2px;flex-shrink:0;background:rgba(32,210,190,0.07);display:flex;align-items:center;justify-content:center;font-size:0.85rem;}
.li-info b{display:block;font-size:0.83rem;color:#e8ddd0;font-family:'Cinzel',serif;font-weight:400;letter-spacing:0.02em;}
.li-info small{font-size:0.7rem;color:rgba(232,221,208,0.38);}
.li-empty-msg{padding:22px 14px;text-align:center;color:rgba(232,221,208,0.28);font-style:italic;font-size:0.82rem;line-height:1.65;}

/* POPUPS */
.leaflet-popup-content-wrapper{background:#12100c;border:1px solid rgba(255,120,30,0.32);border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,0.75);padding:0;}
.leaflet-popup-tip{background:#12100c;}
.leaflet-popup-content{margin:0;width:248px!important;}
.pi{padding:12px 14px 11px;}
.p-reg{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(232,221,208,0.28);margin-bottom:4px;font-family:'Cinzel',serif;}
.p-name{font-family:'Cinzel',serif;font-size:0.88rem;font-weight:600;color:#ff9040;letter-spacing:0.04em;line-height:1.3;margin-bottom:5px;}
.p-status{display:inline-block;font-size:0.57rem;font-family:'Cinzel',serif;letter-spacing:0.12em;text-transform:uppercase;padding:2px 6px;border-radius:2px;margin-bottom:7px;font-weight:600;}
.s-act{background:rgba(255,80,20,0.16);color:#ff6030;border:1px solid rgba(255,80,20,0.38);}
.s-dor{background:rgba(255,165,40,0.16);color:#ffaa28;border:1px solid rgba(255,165,40,0.38);}
.s-ina{background:rgba(130,110,80,0.16);color:#a08868;border:1px solid rgba(130,110,80,0.38);}
.p-desc{font-size:0.77rem;color:rgba(232,221,208,0.62);line-height:1.5;margin-bottom:9px;font-style:italic;}
.p-wiki{display:block;font-size:0.63rem;font-family:'Cinzel',serif;letter-spacing:0.09em;text-transform:uppercase;color:#ff7a1e;text-decoration:none;padding:5px 9px;border:1px solid rgba(255,120,30,0.28);border-radius:2px;text-align:center;background:rgba(255,120,30,0.05);}
.p-wiki:hover{background:rgba(255,120,30,0.16);}
.p-nowiki{font-size:0.63rem;color:rgba(232,221,208,0.2);text-align:center;font-style:italic;}
.mp-name{font-family:'Cinzel',serif;font-size:0.92rem;color:#20d2be;letter-spacing:0.04em;margin-bottom:3px;}
.mp-date{font-size:0.72rem;color:rgba(232,221,208,0.42);margin-bottom:7px;}
.mp-notes{font-size:0.77rem;color:rgba(232,221,208,0.58);font-style:italic;line-height:1.5;margin-bottom:8px;}
.mp-open{display:block;font-size:0.63rem;font-family:'Cinzel',serif;letter-spacing:0.09em;text-transform:uppercase;color:#20d2be;padding:5px 9px;border:1px solid rgba(32,210,190,0.28);border-radius:2px;text-align:center;background:rgba(32,210,190,0.06);cursor:pointer;}
.mp-open:hover{background:rgba(32,210,190,0.16);}
.mp-thumb{width:100%;height:78px;object-fit:cover;border-radius:2px;margin-bottom:7px;display:block;}

/* MARKERS */
.vdot{border-radius:50%;border:2px solid;cursor:pointer;transition:transform 0.15s;}
.vdot:hover{transform:scale(1.7);}
.mdot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(32,210,190,0.9);cursor:pointer;transition:transform 0.15s;background:rgba(32,210,190,0.82);box-shadow:0 0 8px rgba(32,210,190,0.5);}
.mdot:hover{transform:scale(1.6);}
.ydot{width:13px;height:13px;background:rgba(80,180,255,0.85);border:2px solid #50b4ff;border-radius:50%;animation:pyou 1.8s ease-in-out infinite;}
@keyframes pyou{0%,100%{box-shadow:0 0 10px #50b4ff;transform:scale(1);}50%{box-shadow:0 0 22px #50b4ff;transform:scale(1.28);}}

/* MODALS */
.ov{position:fixed;inset:0;z-index:3000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.2s;}
.ov.open{opacity:1;pointer-events:all;}
.mb{background:#0f0d0a;border:1px solid rgba(255,120,30,0.22);border-radius:5px;width:92%;max-width:510px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.8);}
.mb::-webkit-scrollbar{width:3px;}
.mb::-webkit-scrollbar-thumb{background:rgba(255,120,30,0.18);border-radius:2px;}
.mh{padding:14px 17px 12px;border-bottom:1px solid rgba(255,120,30,0.1);display:flex;align-items:flex-start;justify-content:space-between;}
.mt{font-family:'Cinzel',serif;font-size:0.92rem;color:#ff9040;letter-spacing:0.04em;}
.ms{font-size:0.72rem;color:rgba(232,221,208,0.36);margin-top:3px;font-style:italic;}
.mc{background:none;border:none;color:rgba(232,221,208,0.32);font-size:1.05rem;cursor:pointer;margin-left:9px;flex-shrink:0;}
.mc:hover{color:#e8ddd0;}
.mbody{padding:13px 17px;}
.fld{margin-bottom:12px;}
.fld label{display:block;font-family:'Cinzel',serif;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(232,221,208,0.38);margin-bottom:4px;}
.fld input,.fld textarea{width:100%;background:#1a1510;border:1px solid rgba(255,120,30,0.18);border-radius:3px;color:#e8ddd0;font-family:'Crimson Pro',serif;font-size:0.88rem;padding:7px 9px;outline:none;resize:vertical;box-sizing:border-box;}
.fld input:focus,.fld textarea:focus{border-color:rgba(255,120,30,0.48);}
.fld textarea{min-height:62px;}
.mact{display:flex;gap:7px;justify-content:flex-end;padding:10px 17px 15px;border-top:1px solid rgba(255,120,30,0.08);}
.bp{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;padding:7px 13px;border-radius:2px;border:none;background:rgba(255,120,30,0.18);color:#ff9040;cursor:pointer;transition:all 0.2s;}
.bp:hover:not(:disabled){background:rgba(255,120,30,0.32);}
.bp:disabled{opacity:0.38;cursor:default;}
.bg{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;padding:7px 11px;border-radius:2px;border:1px solid rgba(232,221,208,0.14);background:transparent;color:rgba(232,221,208,0.42);cursor:pointer;transition:all 0.2s;}
.bg:hover{border-color:rgba(232,221,208,0.38);color:#e8ddd0;}
.bd{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;padding:7px 11px;border-radius:2px;border:1px solid rgba(200,60,30,0.28);background:rgba(200,60,30,0.09);color:#cc4422;cursor:pointer;transition:all 0.2s;}
.bd:hover{background:rgba(200,60,30,0.22);}

/* VIEW MODAL SPECIFIC */
.vname{font-family:'Cinzel',serif;font-size:1rem;color:#20d2be;letter-spacing:0.05em;line-height:1.3;}
.vdate{font-size:0.75rem;color:rgba(232,221,208,0.38);margin-top:4px;font-style:italic;}
.vnotes{font-size:0.84rem;color:rgba(232,221,208,0.62);line-height:1.6;font-style:italic;padding:11px 17px 12px;border-bottom:1px solid rgba(255,120,30,0.07);}
.psec{padding:12px 17px;}
.psec-lbl{font-family:'Cinzel',serif;font-size:0.58rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(232,221,208,0.28);margin-bottom:8px;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.pcell{position:relative;aspect-ratio:1;border-radius:3px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,0.03);}
.pcell img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.2s;}
.pcell:hover img{opacity:0.78;}
.pdel{position:absolute;top:3px;right:3px;width:19px;height:19px;border-radius:50%;background:rgba(0,0,0,0.68);border:none;color:#e8ddd0;font-size:0.65rem;cursor:pointer;display:none;align-items:center;justify-content:center;}
.pcell:hover .pdel{display:flex;}
.pdel:hover{background:rgba(200,60,30,0.8);}
.padd{aspect-ratio:1;border-radius:3px;border:1px dashed rgba(32,210,190,0.22);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;transition:all 0.2s;}
.padd:hover{border-color:rgba(32,210,190,0.48);background:rgba(32,210,190,0.04);}
.padd span{font-size:1.2rem;color:rgba(232,221,208,0.18);}
.padd small{font-size:0.57rem;color:rgba(232,221,208,0.18);font-family:'Cinzel',serif;letter-spacing:0.06em;text-transform:uppercase;}
.padd.maxed{opacity:0.38;cursor:default;pointer-events:none;}
.pspin{aspect-ratio:1;border-radius:3px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;}
.spin{width:16px;height:16px;border:2px solid rgba(32,210,190,0.18);border-top-color:#20d2be;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.vact{padding:11px 17px 15px;display:flex;gap:7px;flex-wrap:wrap;border-top:1px solid rgba(255,120,30,0.07);}
.sv{padding:0 17px 11px;}
.ev{padding:0 17px 11px;display:none;}
.ev.show{display:block;}

/* LIGHTBOX */
#lb{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;}
#lb.open{display:flex;}
#lb img{max-width:94vw;max-height:87vh;object-fit:contain;border-radius:3px;}
#lb-x{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.14);color:#e8ddd0;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center;}
.lbnav{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;pointer-events:none;}
.lbb{pointer-events:all;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.14);color:#e8ddd0;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.15rem;display:flex;align-items:center;justify-content:center;}
.lbb:hover{background:rgba(32,210,190,0.3);}
#lb-ctr{position:absolute;bottom:18px;font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.12em;color:rgba(232,221,208,0.38);}

/* LOADING OVERLAY */
#loading{position:fixed;inset:0;background:#0a0805;z-index:8000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#loading.gone{display:none;}
#loading .spin{width:28px;height:28px;border-width:3px;}
#loading p{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(232,221,208,0.38);}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading"><div class="spin"></div><p>Loading…</p></div>

<!-- AUTH -->
<div id="auth-screen">
  <h1>Iceland</h1>
  <p>Family Trip Log &amp; Volcanic Map</p>
  <button id="sign-in-btn" disabled>Sign in with Google</button>
  <div id="auth-msg"></div>
</div>

<!-- NO ACCESS -->
<div id="no-access">
  <h2>Access Denied</h2>
  <p>Your Google account doesn't have access to the Iceland Trip Log. Ask Adam to share the folder with you.</p>
  <button onclick="signOut()" style="margin-top:22px;" class="bg">Try another account</button>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>Iceland</h1>
    <button id="tvol" class="tbtn on">🌋 Volcanoes</button>
    <button id="tmem" class="tbtn">📍 Memories</button>
    <button id="tlist" class="lbtn">☰ List</button>
    <div class="leg-row" id="leg-row">
      <div class="leg"><div class="ld a"></div>Active</div>
      <div class="leg"><div class="ld d"></div>Dormant</div>
      <div class="leg"><div class="ld i"></div>Inactive</div>
      <div class="leg"><div class="ld y"></div>You</div>
    </div>
    <div class="user-row">
      <span id="user-label"></span>
      <button class="so-btn" onclick="signOut()">Sign out</button>
    </div>
  </header>
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="Search, or paste coords / Google Maps link…" autocomplete="off">
    <div id="search-drop"></div>
  </div>
  <div id="map-wrap">
    <div id="list-panel">
      <div class="lp-head"><span>Places Visited</span><button class="lp-close" id="lp-close">✕</button></div>
      <div id="list-items"></div>
    </div>
    <div id="map"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="ov" id="add-ov">
  <div class="mb">
    <div class="mh">
      <div><div class="mt" id="add-title">Add Location</div><div class="ms" id="add-sub"></div></div>
      <button class="mc" id="add-x">✕</button>
    </div>
    <div class="mbody">
      <div class="fld"><label>Name</label><input id="add-name" type="text"></div>
      <div class="fld"><label>Date Visited</label><input id="add-date" type="date"></div>
      <div class="fld"><label>Notes</label><textarea id="add-notes" placeholder="What was it like?"></textarea></div>
    </div>
    <div class="mact">
      <button class="bg" id="add-cancel">Cancel</button>
      <button class="bp" id="add-save">Save Location</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="ov" id="view-ov">
  <div class="mb">
    <div class="mh">
      <div><div class="vname" id="vname"></div><div class="vdate" id="vdate"></div></div>
      <button class="mc" id="view-x">✕</button>
    </div>
    <div class="sv" id="sv"><div id="vnotes" class="vnotes" style="padding:10px 0 11px;border:none;"></div></div>
    <div class="ev" id="ev">

let gsiReady = false;
function onGsiLoad() {
  gsiReady = true;
  const btn = document.getElementById('sign-in-btn');
  btn.disabled = false;
  btn.textContent = 'Sign in with Google';
  document.getElementById('loading').classList.add('gone');
  document.getElementById('auth-screen').classList.remove('gone');
}

// Poll for GSI readiness
(function waitGsi() {
  if (window.google && window.google.accounts) { onGsiLoad(); }
  else { setTimeout(waitGsi, 100); }
})();

document.getElementById('sign-in-btn').addEventListener('click', () => {
  setMsg('Opening sign-in…');
  const btn = document.getElementById('sign-in-btn');
  btn.disabled = true;
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (r) => {
      if (r.error) { setMsg('Sign-in error: ' + r.error); btn.disabled = false; return; }
      token = r.access_token;
      setMsg('Checking access…');
      await boot();
    }
  });
  client.requestAccessToken({ prompt: 'select_account' });
});

async function boot() {
  const btn = document.getElementById('sign-in-btn');
  try {
    // Get email
    const me = await dGet('https://www.googleapis.com/oauth2/v2/userinfo');
    document.getElementById('user-label').textContent = me.email || '';

    // Check folder access
    const ok = await checkFolderAccess();
    if (!ok) {
      document.getElementById('auth-screen').classList.add('gone');
      document.getElementById('no-access').classList.add('show');
      return;
    }

    // Load data
    setMsg('Loading trip data…');
    await loadLocs();

    // Show app
    document.getElementById('auth-screen').classList.add('gone');
    document.getElementById('app').classList.add('show');
    if (!map) initMap();
    await renderAllMMarkers();
    renderList();
    startGPS();

  } catch(e) {
    console.error(e);
    setMsg('Error: ' + e.message);
    btn.disabled = false;
  }
}

function setMsg(m) { document.getElementById('auth-msg').textContent = m; }

function signOut() {
  if (token) google.accounts.oauth2.revoke(token, ()=>{});
  token = null;
  location.reload();
}

// ══════════════════════════════════
// DRIVE API
// ══════════════════════════════════
async function dGet(url, qs = '') {
  const res = await fetch(url + (qs ? '?' + qs : ''), { headers: { Authorization: 'Bearer ' + token } });
  if (!res.ok) { const t = await res.text(); throw new Error('Drive ' + res.status + ': ' + t.slice(0,120)); }
  return res.json();
}

async function dList(q, fields = 'files(id,name,mimeType)') {
  const data = await dGet('https://www.googleapis.com/drive/v3/files', new URLSearchParams({ q, fields, pageSize: 200 }));
  return data.files || [];
}

async function dReadFile(id) {
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, { headers: { Authorization: 'Bearer ' + token } });
  if (!res.ok) throw new Error('Read failed ' + res.status);
  return res;
}

async function dWriteJson(name, content, parentId, existingId = null) {
  const meta = { name, mimeType: 'application/json' };
  if (!existingId) meta.parents = [parentId];
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
  form.append('file', new Blob([JSON.stringify(content, null, 2)], { type: 'application/json' }));
  const url = existingId
    ? `https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart`
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const res = await fetch(url, { method: existingId ? 'PATCH' : 'POST', headers: { Authorization: 'Bearer ' + token }, body: form });
  if (!res.ok) throw new Error('Write JSON failed ' + res.status);
  return res.json();
}

async function dMkdir(name, parentId) {
  const res = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  if (!res.ok) throw new Error('mkdir failed');
  return res.json();
}

async function dUploadPhoto(file, parentId) {
  const meta = { name: file.name, parents: [parentId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
  form.append('file', file);
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name', {
    method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: form
  });
  if (!res.ok) throw new Error('Photo upload failed ' + res.status);
  return res.json();
}

async function dDelete(id) {
  await fetch(`https://www.googleapis.com/drive/v3/files/${id}`, { method: 'DELETE', headers: { Authorization: 'Bearer ' + token } });
}

// ══════════════════════════════════
// FOLDER + LOCATIONS
// ══════════════════════════════════
async function checkFolderAccess() {
  try {
    await dList(`'${DRIVE_FOLDER_ID}' in parents and trashed=false`, 'files(id)');
    return true;
  } catch { return false; }
}

async function loadLocs() {
  const files = await dList(`'${DRIVE_FOLDER_ID}' in parents and name='locations.json' and trashed=false`, 'files(id,name)');
  if (files.length > 0) {
    locsFileId = files[0].id;
    const res = await dReadFile(locsFileId);
    locs = await res.json();
  } else {
    locs = [];
    const f = await dWriteJson('locations.json', [], DRIVE_FOLDER_ID);
    locsFileId = f.id;
  }
}

async function saveLocs() {
  await dWriteJson('locations.json', locs, DRIVE_FOLDER_ID, locsFileId);
}

// ══════════════════════════════════
// PHOTOS
// ══════════════════════════════════
async function getPhotoUrl(driveId) {
  if (photoCache[driveId]) return photoCache[driveId];
  const res = await dReadFile(driveId);
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  photoCache[driveId] = url;
  return url;
}

function initMap() {
  map = L.map('map', { center:[64.9,-18.5], zoom:6 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:18 }).addTo(map);

  vGroup = L.layerGroup().addTo(map);
  mGroup = L.layerGroup();

  // Volcano markers
  VOLCANOES.forEach(v => {
    const c = VC[v.st];
    const icon = L.divIcon({ className:'', html:`<div class="vdot" style="width:11px;height:11px;background:${c.f};border-color:${c.s};box-shadow:0 0 5px ${c.g},0 0 2px rgba(0,0,0,0.9);"></div>`, iconSize:[11,11], iconAnchor:[5,5], popupAnchor:[0,-7] });
    const lbl = v.st[0].toUpperCase() + v.st.slice(1);
    const pop = `<div class="pi"><div class="p-reg">${v.r}</div><div class="p-name">${v.n}</div><div><span class="p-status s-${v.st.slice(0,3)}">${lbl}</span></div><div class="p-desc">${v.d}</div>${v.w ? `<a class="p-wiki" href="${v.w}" target="_blank" rel="noopener">→ Wikipedia</a>` : '<div class="p-nowiki">No Wikipedia article</div>'}</div>`;
    L.marker([v.lat,v.lng], { icon }).bindPopup(pop, { closeButton:false, maxWidth:260 }).addTo(vGroup);
  });

  // GPS dot placeholder
  const youIcon = L.divIcon({ className:'', html:'<div class="ydot"></div>', iconSize:[13,13], iconAnchor:[6,6], popupAnchor:[0,-10] });
  window._youMarker = L.marker([64.9,-18.5], { icon:youIcon, zIndexOffset:3000 }).bindPopup('<div class="pi"><div class="p-name" style="color:#50b4ff;">📍 You</div></div>', { closeButton:false });
}

function startGPS() {
  if (!navigator.geolocation) return;
  const opts = { enableHighAccuracy:true, maximumAge:10000, timeout:15000 };
  function upd(pos) {
    const { latitude:lat, longitude:lng } = pos.coords;
    if (window._youMarker) {
      window._youMarker.setLatLng([lat,lng]).addTo(map);
    }
  }
  navigator.geolocation.watchPosition(upd, ()=>{}, opts);
}

// ══════════════════════════════════
// MEMORY MARKERS
// ══════════════════════════════════
function memIcon() {
  return L.divIcon({ className:'', html:'<div class="mdot"></div>', iconSize:[12,12], iconAnchor:[6,6], popupAnchor:[0,-9] });
}

async function addMMarker(loc) {
  if (mMarkers[loc.id]) { mGroup.removeLayer(mMarkers[loc.id]); delete mMarkers[loc.id]; }
  const marker = L.marker([loc.lat,loc.lng], { icon:memIcon(), zIndexOffset:1000 });
  let thumbHtml = '';
  if (loc.drivePhotoIds && loc.drivePhotoIds.length > 0) {
    try {
      const src = await getPhotoUrl(loc.drivePhotoIds[0]);
      thumbHtml = `<img class="mp-thumb" src="${src}" alt="">`;
    } catch {}
  }
  const snippet = loc.notes ? (loc.notes.length > 70 ? loc.notes.slice(0,70)+'…' : loc.notes) : '';
  const pop = `<div class="pi">${thumbHtml}<div class="mp-name">${loc.name}</div><div class="mp-date">${loc.date||'No date'}</div>${snippet?`<div class="mp-notes">${snippet}</div>`:''}<div class="mp-open" onclick="openView('${loc.id}')">→ View &amp; Photos</div></div>`;
  marker.bindPopup(pop, { closeButton:false, maxWidth:256 });
  mMarkers[loc.id] = marker;
  marker.addTo(mGroup);
}

async function renderAllMMarkers() {
  mGroup.clearLayers();
  mMarkers = {};
  for (const loc of locs) await addMMarker(loc);
}

// ══════════════════════════════════
// SEARCH
// ══════════════════════════════════
const si = document.getElementById('search-input');
const sd = document.getElementById('search-drop');

si.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = si.value.trim();
  if (q.length < 2) { sd.style.display='none'; return; }

  // Try to parse coords or Google Maps URL immediately
  const direct = parseDirectInput(q);
  if (direct) {
    sd.innerHTML = '';
    const el = document.createElement('div');
    el.className = 'si';
    el.innerHTML = `<b>📍 Use this location</b><small>${direct.lat.toFixed(5)}, ${direct.lng.toFixed(5)}</small>`;
    el.addEventListener('click', () => {
      sd.style.display = 'none'; si.value = '';
      openAdd(direct.lat, direct.lng, direct.name || '');
    });
    sd.appendChild(el);
    sd.style.display = 'block';
    return;
  }

  sd.innerHTML = '<div class="si"><small style="color:rgba(232,221,208,0.38)">Searching…</small></div>';
  sd.style.display = 'block';
  searchTimer = setTimeout(() => runSearch(q), 400);
});

function parseDirectInput(q) {
  // "lat, lng" or "lat lng"
  const coordMatch = q.match(/^(-?\d{1,3}\.?\d*)[,\s]+(-?\d{1,3}\.?\d*)$/);
  if (coordMatch) return { lat: parseFloat(coordMatch[1]), lng: parseFloat(coordMatch[2]) };
  // Google Maps URL — extracts @lat,lng from full URL
  const mapsMatch = q.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
  if (mapsMatch) return { lat: parseFloat(mapsMatch[1]), lng: parseFloat(mapsMatch[2]) };
  // place/Name/@lat,lng format
  const placeMatch = q.match(/place\/([^/]+)\/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
  if (placeMatch) return { lat: parseFloat(placeMatch[2]), lng: parseFloat(placeMatch[3]), name: decodeURIComponent(placeMatch[1]).replace(/\+/g,' ') };
  return null;
}

async function runSearch(q) {
  try {
    const base = 'https://nominatim.openstreetmap.org/search';
    let data = await (await fetch(`${base}?${new URLSearchParams({q, format:'json', limit:5, 'accept-language':'en', countrycodes:'is'})}`)).json();
    // Fallback: retry without country restriction if nothing found
    if (!data.length) {
      data = await (await fetch(`${base}?${new URLSearchParams({q:q+' Iceland', format:'json', limit:5, 'accept-language':'en'})}`)).json();
    }
    renderDrop(data);
  } catch(e) {
    sd.innerHTML = `<div class="si"><small style="color:#ff6060">Search error: ${e.message}</small></div>`;
    sd.style.display = 'block';
  }
}

function renderDrop(results) {
  if (!results.length) {
    sd.innerHTML = '<div class="si"><small style="color:rgba(232,221,208,0.38)">Not found — try pasting a Google Maps link or coordinates</small></div>';
    sd.style.display = 'block';
    return;
  }
  sd.innerHTML = '';
  results.slice(0,5).forEach(r => {
    const name = r.display_name.split(',')[0];
    const sub  = r.display_name.split(',').slice(1,3).join(',').trim();
    const el = document.createElement('div');
    el.className = 'si';
    el.innerHTML = `<b>${name}</b><small>${sub}</small>`;
    el.addEventListener('click', () => {
      sd.style.display = 'none';
      si.value = '';
      openAdd(parseFloat(r.lat), parseFloat(r.lon), name);
    });
    sd.appendChild(el);
  });
  sd.style.display = 'block';
}

document.addEventListener('click', e => { if (!e.target.closest('#search-bar')) sd.style.display='none'; });

// ══════════════════════════════════
// ADD MODAL
// ══════════════════════════════════
function openAdd(lat, lng, name='') {
  pendingLat = lat; pendingLng = lng;
  document.getElementById('add-title').textContent = 'Add Location';
  document.getElementById('add-sub').textContent   = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  document.getElementById('add-name').value = name;
  document.getElementById('add-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('add-notes').value = '';
  map.setView([lat,lng], Math.max(map.getZoom(),11));
  document.getElementById('add-ov').classList.add('open');
}

function closeAdd() { document.getElementById('add-ov').classList.remove('open'); }
document.getElementById('add-x').addEventListener('click', closeAdd);
document.getElementById('add-cancel').addEventListener('click', closeAdd);
document.getElementById('add-ov').addEventListener('click', e => { if(e.target===document.getElementById('add-ov')) closeAdd(); });

document.getElementById('add-save').addEventListener('click', async () => {
  const name = document.getElementById('add-name').value.trim();
  if (!name || pendingLat===null) return;
  const btn = document.getElementById('add-save');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    // Create Drive subfolder for this location
    const folderRes = await dMkdir(name, DRIVE_FOLDER_ID);
    const loc = {
      id: 'loc_' + Date.now(),
      name,
      lat: pendingLat, lng: pendingLng,
      date: document.getElementById('add-date').value,
      notes: document.getElementById('add-notes').value.trim(),
      drivePhotoIds: [],
      driveFolderId: folderRes.id
    };
    locs.push(loc);
    await saveLocs();
    await addMMarker(loc);
    if (showMem) mGroup.addTo(map);
    renderList();
    closeAdd();
    await openView(loc.id);
  } catch(e) {
    alert('Save failed: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'Save Location';
});

// ══════════════════════════════════
// VIEW / EDIT MODAL
// ══════════════════════════════════
window.openView = async function(id) {
  curLocId = id;
  const loc = locs.find(l=>l.id===id);
  if (!loc) return;
  renderViewStatic(loc);
  await renderPhotoGrid(loc);
  document.getElementById('view-ov').classList.add('open');
  if (mMarkers[id]) {
    map.setView([loc.lat,loc.lng], Math.max(map.getZoom(),11));
    setTimeout(()=>mMarkers[id].openPopup(), 300);
  }
};

function renderViewStatic(loc) {
  document.getElementById('vname').textContent = loc.name;
  document.getElementById('vdate').textContent = loc.date || 'No date';
  document.getElementById('vnotes').textContent = loc.notes || 'No notes.';
  document.getElementById('sv').style.display = '';
  document.getElementById('ev').classList.remove('show');
  document.getElementById('edit-tog').style.display = '';
  document.getElementById('edit-save').style.display = 'none';
  document.getElementById('edit-can').style.display = 'none';
}

function closeView() { document.getElementById('view-ov').classList.remove('open'); curLocId=null; }
document.getElementById('view-x').addEventListener('click', closeView);
document.getElementById('view-ov').addEventListener('click', e => { if(e.target===document.getElementById('view-ov')) closeView(); });

document.getElementById('edit-tog').addEventListener('click', () => {
  const loc = locs.find(l=>l.id===curLocId); if(!loc) return;
  document.getElementById('en').value = loc.name;
  document.getElementById('ed').value = loc.date||'';
  document.getElementById('eno').value = loc.notes||'';
  document.getElementById('sv').style.display = 'none';
  document.getElementById('ev').classList.add('show');
  document.getElementById('edit-tog').style.display = 'none';
  document.getElementById('edit-save').style.display = '';
  document.getElementById('edit-can').style.display = '';
});

document.getElementById('edit-can').addEventListener('click', () => {
  const loc = locs.find(l=>l.id===curLocId); if(loc) renderViewStatic(loc);
});

document.getElementById('edit-save').addEventListener('click', async () => {
  const loc = locs.find(l=>l.id===curLocId); if(!loc) return;
  const btn = document.getElementById('edit-save');
  btn.disabled=true; btn.textContent='Saving…';
  loc.name  = document.getElementById('en').value.trim() || loc.name;
  loc.date  = document.getElementById('ed').value;
  loc.notes = document.getElementById('eno').value.trim();
  await saveLocs();
  renderViewStatic(loc);
  renderList();
  await addMMarker(loc);
  btn.disabled=false; btn.textContent='Save';
});

document.getElementById('del-loc').addEventListener('click', async () => {
  const loc = locs.find(l=>l.id===curLocId); if(!loc) return;
  if (!confirm(`Delete "${loc.name}" and all its photos?`)) return;
  try {
    // Delete Drive folder (and contents)
    if (loc.driveFolderId) await dDelete(loc.driveFolderId);
    locs = locs.filter(l=>l.id!==curLocId);
    await saveLocs();
    if (mMarkers[curLocId]) { mGroup.removeLayer(mMarkers[curLocId]); delete mMarkers[curLocId]; }
    // Clean photo cache
    (loc.drivePhotoIds||[]).forEach(id => { if(photoCache[id]) { URL.revokeObjectURL(photoCache[id]); delete photoCache[id]; } });
    renderList();
    closeView();
  } catch(e) { alert('Delete failed: ' + e.message); }
});

// ══════════════════════════════════
// PHOTO GRID
// ══════════════════════════════════
async function renderPhotoGrid(loc) {
  const grid = document.getElementById('pgrid');
  const countLbl = document.getElementById('pcount');
  grid.innerHTML = '';
  lbPhotos = [];

  for (const pid of (loc.drivePhotoIds||[])) {
    try {
      const src = await getPhotoUrl(pid);
      lbPhotos.push({ pid, src });
      const idx = lbPhotos.length - 1;
      const cell = document.createElement('div'); cell.className='pcell';
      cell.innerHTML = `<img src="${src}" alt="" loading="lazy"><button class="pdel">✕</button>`;
      cell.querySelector('img').addEventListener('click', () => openLb(idx));
      cell.querySelector('.pdel').addEventListener('click', async e => {
        e.stopPropagation();
        if (!confirm('Delete this photo from Drive?')) return;
        await deletePhoto(loc.id, pid);
        const updated = locs.find(l=>l.id===loc.id);
        if (updated) await renderPhotoGrid(updated);
      });
      grid.appendChild(cell);
    } catch {}
  }

  // Add button
  const count = (loc.drivePhotoIds||[]).length;
  countLbl.textContent = `${count}/${MAX_PHOTOS}`;
  const addCell = document.createElement('div');
  addCell.className = 'padd' + (count >= MAX_PHOTOS ? ' maxed' : '');
  addCell.innerHTML = '<span>＋</span><small>Add Photo</small>';
  addCell.addEventListener('click', () => { if(count < MAX_PHOTOS) document.getElementById('photo-input').click(); });
  grid.appendChild(addCell);
}

async function deletePhoto(locId, pid) {
  try { await dDelete(pid); } catch {}
  const loc = locs.find(l=>l.id===locId); if(!loc) return;
  loc.drivePhotoIds = (loc.drivePhotoIds||[]).filter(id=>id!==pid);
  if (photoCache[pid]) { URL.revokeObjectURL(photoCache[pid]); delete photoCache[pid]; }
  await saveLocs();
  await addMMarker(loc);
}

document.getElementById('photo-input').addEventListener('change', async e => {
  const files = Array.from(e.target.files);
  if (!files.length || !curLocId) return;
  const loc = locs.find(l=>l.id===curLocId); if(!loc) return;
  const remaining = MAX_PHOTOS - (loc.drivePhotoIds||[]).length;
  const toUpload = files.slice(0, remaining);
  if (!toUpload.length) { alert(`Max ${MAX_PHOTOS} photos per location.`); return; }

  // Show spinners
  const grid = document.getElementById('pgrid');
  const addBtn = grid.querySelector('.padd');
  toUpload.forEach(() => {
    const s = document.createElement('div'); s.className='pspin';
    s.innerHTML='<div class="spin"></div>';
    if (addBtn) grid.insertBefore(s, addBtn); else grid.appendChild(s);
  });

  for (const file of toUpload) {
    try {
      const uploaded = await dUploadPhoto(file, loc.driveFolderId);
      if (!loc.drivePhotoIds) loc.drivePhotoIds=[];
      loc.drivePhotoIds.push(uploaded.id);
      await saveLocs();
    } catch(err) { console.error('Upload error:', err); }
  }
  e.target.value = '';
  await renderPhotoGrid(loc);
  await addMMarker(loc);
});

// ══════════════════════════════════
// LIGHTBOX
// ══════════════════════════════════
function openLb(idx) {
  lbIdx = idx;
  document.getElementById('lb-img').src = lbPhotos[idx].src;
  document.getElementById('lb-ctr').textContent = `${idx+1} / ${lbPhotos.length}`;
  document.getElementById('lb').classList.add('open');
}
function closeLb() { document.getElementById('lb').classList.remove('open'); document.getElementById('lb-img').src=''; }
document.getElementById('lb-x').addEventListener('click', closeLb);
document.getElementById('lb').addEventListener('click', e=>{ if(e.target===document.getElementById('lb')) closeLb(); });
document.getElementById('lb-p').addEventListener('click', e=>{ e.stopPropagation(); lbIdx=(lbIdx-1+lbPhotos.length)%lbPhotos.length; document.getElementById('lb-img').src=lbPhotos[lbIdx].src; document.getElementById('lb-ctr').textContent=`${lbIdx+1} / ${lbPhotos.length}`; });
document.getElementById('lb-n').addEventListener('click', e=>{ e.stopPropagation(); lbIdx=(lbIdx+1)%lbPhotos.length; document.getElementById('lb-img').src=lbPhotos[lbIdx].src; document.getElementById('lb-ctr').textContent=`${lbIdx+1} / ${lbPhotos.length}`; });
document.addEventListener('keydown', e=>{ if(!document.getElementById('lb').classList.contains('open')) return; if(e.key==='ArrowLeft') document.getElementById('lb-p').click(); if(e.key==='ArrowRight') document.getElementById('lb-n').click(); if(e.key==='Escape') closeLb(); });

// ══════════════════════════════════
// LIST
// ══════════════════════════════════
async function renderList() {
  const box = document.getElementById('list-items');
  if (!locs.length) { box.innerHTML='<div class="li-empty-msg">No places visited yet.<br>Turn on Memories and search for a location.</div>'; return; }
  box.innerHTML='';
  const sorted = [...locs].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  for (const loc of sorted) {
    const li = document.createElement('div'); li.className='li';
    let thumb = '<div class="li-empty">📍</div>';
    if (loc.drivePhotoIds && loc.drivePhotoIds.length > 0) {
      try { const src=await getPhotoUrl(loc.drivePhotoIds[0]); thumb=`<img class="li-thumb" src="${src}" alt="">`; } catch {}
    }
    li.innerHTML = `${thumb}<div class="li-info"><b>${loc.name}</b><small>${loc.date||'No date'} · ${(loc.drivePhotoIds||[]).length} photo${(loc.drivePhotoIds||[]).length!==1?'s':''}</small></div>`;
    li.addEventListener('click', async ()=>{ document.getElementById('list-panel').classList.remove('open'); map.setView([loc.lat,loc.lng],12); await openView(loc.id); });
    box.appendChild(li);
  }
}

// ══════════════════════════════════
// TOGGLES + UI
// ══════════════════════════════════
document.getElementById('tvol').addEventListener('click', function(){
  showVol = !showVol; this.classList.toggle('on', showVol);
  if (showVol) map.addLayer(vGroup); else map.removeLayer(vGroup);
});

document.getElementById('tmem').addEventListener('click', function(){
  showMem = !showMem; this.classList.toggle('on', showMem);
  document.getElementById('search-bar').classList.toggle('show', showMem);
  if (showMem) {
    map.addLayer(mGroup);
    let ml=document.getElementById('mem-leg');
    if (!ml) { ml=document.createElement('div'); ml.className='leg'; ml.id='mem-leg'; ml.innerHTML='<div class="ld m"></div>Memories'; document.getElementById('leg-row').prepend(ml); }
  } else {
    map.removeLayer(mGroup);
    const ml=document.getElementById('mem-leg'); if(ml) ml.remove();
  }
});

document.getElementById('tlist').addEventListener('click', ()=>{ renderList(); document.getElementById('list-panel').classList.toggle('open'); });
document.getElementById('lp-close').addEventListener('click', ()=>document.getElementById('list-panel').classList.remove('open'));
</script>
